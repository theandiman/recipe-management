name: Reusable Backend Java Cloud Run CD

on:
  workflow_call:
    inputs:
      service_name:
        description: Cloud Run service name
        required: true
        type: string
      artifact_registry_repository:
        description: Artifact Registry repository path segment (for example `recipe-ai`)
        required: true
        type: string
      region:
        description: Google Cloud region
        required: false
        default: europe-west2
        type: string
      gcp_registry:
        description: Artifact Registry host
        required: false
        default: europe-west2-docker.pkg.dev
        type: string
      build_artifact_name:
        description: Artifact name produced by the CI workflow
        required: false
        default: build-artifacts
        type: string
      docker_context:
        description: Docker build context
        required: false
        default: .
        type: string
      dockerfile_path:
        description: Dockerfile path
        required: false
        default: Dockerfile
        type: string
      deployment_test_script:
        description: Script executed after deployment
        required: false
        default: test-deployment.sh
        type: string
      run_security_scan:
        description: Whether to run the OWASP ZAP scan job
        required: false
        default: true
        type: boolean
      run_post_deploy_tests:
        description: Whether to run the post-deployment smoke tests
        required: false
        default: true
        type: boolean
      run_version_bump:
        description: Whether to prepare the next development version on main
        required: false
        default: true
        type: boolean
    secrets:
      GCP_SA_KEY:
        required: true
      GCP_PROJECT_ID:
        required: true

jobs:
  docker:
    name: Build and Push Docker Image
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      actions: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Download build artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          name: ${{ inputs.build_artifact_name }}
          path: .

      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Build and push Docker image
        env:
          GCP_REGISTRY: ${{ inputs.gcp_registry }}
          REGION: ${{ inputs.region }}
        run: |
          VERSION=$(cat .build_version)
          echo "Tagging image with version: $VERSION"

          gcloud auth configure-docker "$REGION-docker.pkg.dev"

          docker build \
            -f "${{ inputs.dockerfile_path }}" \
            -t "$GCP_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_registry_repository }}/${{ inputs.service_name }}:$GITHUB_SHA" \
            -t "$GCP_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_registry_repository }}/${{ inputs.service_name }}:$VERSION" \
            "${{ inputs.docker_context }}"

          docker push "$GCP_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_registry_repository }}/${{ inputs.service_name }}:$GITHUB_SHA"
          docker push "$GCP_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_registry_repository }}/${{ inputs.service_name }}:$VERSION"

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    permissions:
      actions: read
    outputs:
      service-url: ${{ steps.deploy.outputs.service-url }}

    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v6.0.0
        with:
          name: ${{ inputs.build_artifact_name }}
          path: .

      - name: Authenticate to Google Cloud
        run: |
          echo "${{ secrets.GCP_SA_KEY }}" | base64 --decode > /tmp/sa-key.json
          gcloud auth activate-service-account --key-file=/tmp/sa-key.json
          gcloud config set project ${{ secrets.GCP_PROJECT_ID }}

      - name: Deploy to Cloud Run
        id: deploy
        env:
          GCP_REGISTRY: ${{ inputs.gcp_registry }}
        run: |
          VERSION=$(cat .build_version)
          gcloud run services update "${{ inputs.service_name }}" \
            --image "$GCP_REGISTRY/${{ secrets.GCP_PROJECT_ID }}/${{ inputs.artifact_registry_repository }}/${{ inputs.service_name }}:$VERSION" \
            --region "${{ inputs.region }}"

          SERVICE_URL=$(gcloud run services describe "${{ inputs.service_name }}" \
            --region "${{ inputs.region }}" \
            --format='value(status.url)')
          echo "service-url=$SERVICE_URL" >> "$GITHUB_OUTPUT"

  security-scan:
    name: OWASP ZAP Security Scan
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && inputs.run_security_scan
    permissions:
      actions: write

    steps:
      - name: Run OWASP ZAP scan
        run: |
          SERVICE_URL="${{ needs.deploy.outputs.service-url }}"

          echo "Running OWASP ZAP baseline scan against $SERVICE_URL"
          mkdir -p zap-reports
          chmod 775 zap-reports

          docker run --rm \
            -v "$(pwd)/zap-reports:/zap/wrk:rw" \
            ghcr.io/zaproxy/zaproxy:stable \
            zap-baseline.py \
            -t "$SERVICE_URL" \
            -m 5 \
            -r zap-report.html \
            -w zap-report.md \
            -J zap-report.json || true

          if [ -f "zap-reports/zap-report.html" ]; then
            echo "✓ ZAP scan complete - reports generated successfully"
            ls -lh zap-reports/
          else
            echo "⚠ Warning: ZAP reports were not generated"
          fi

      - name: Upload ZAP Reports as Artifacts
        if: hashFiles('zap-reports/zap-report.html') != ''
        uses: actions/upload-artifact@v5
        with:
          name: zap-security-reports
          path: zap-reports/zap-report.*
          retention-days: 30

  post-deployment-test:
    name: Post-Deployment Testing
    runs-on: ubuntu-latest
    needs: deploy
    if: github.ref == 'refs/heads/main' && inputs.run_post_deploy_tests
    timeout-minutes: 5
    permissions:
      contents: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Run post-deployment tests
        run: |
          SERVICE_URL="${{ needs.deploy.outputs.service-url }}"

          echo "Running post-deployment tests against $SERVICE_URL"
          chmod +x "${{ inputs.deployment_test_script }}"
          "./${{ inputs.deployment_test_script }}" "$SERVICE_URL"

  version-bump:
    name: Prepare Next Development Version
    runs-on: ubuntu-latest
    needs:
      - deploy
      - security-scan
      - post-deployment-test
    if: >-
      github.ref == 'refs/heads/main' &&
      inputs.run_version_bump &&
      always() &&
      needs.deploy.result == 'success' &&
      (needs.security-scan.result == 'success' || needs.security-scan.result == 'skipped') &&
      (needs.post-deployment-test.result == 'success' || needs.post-deployment-test.result == 'skipped')
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 2
          token: ${{ github.token }}

      - name: Prepare next development version
        shell: bash
        run: |
          if [[ ! -f version.sh ]]; then
            echo "version.sh not found - skipping development version bump"
            exit 0
          fi

          if git log -1 --pretty=format:'%an' | grep -q "CI Bot"; then
            echo "This commit was already a version bump by CI Bot, skipping to prevent infinite loop"
            exit 0
          fi

          echo "Preparing next development version..."
          chmod +x version.sh
          ./version.sh bump-patch
          ./version.sh add-snapshot

          NEXT_VERSION=$(./version.sh current | sed 's/Current version: //')
          echo "Next development version prepared: $NEXT_VERSION"

          git config --global user.email "ci@recipe-management.com"
          git config --global user.name "CI Bot"

          git add pom.xml
          git commit -m "Bump version to $NEXT_VERSION for next development cycle"
          git push origin main
